name: Bug report
description: Report a reproducible compatibility-analysis defect.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Use synthetic or anonymized inputs only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentCompat and Python versions
    validations:
      required: true
